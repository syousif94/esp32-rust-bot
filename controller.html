<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>ESP32 Car Controller</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .status {
        position: absolute;
        top: 20px;
        font-size: 12px;
        color: #555;
        transition: color 0.3s;
      }
      .status.ok {
        color: #0f0;
      }
      .status.err {
        color: #f44;
      }

      .battery {
        position: absolute;
        top: 40px;
        font-size: 14px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: #555;
        transition: color 0.3s;
      }
      .battery.high {
        color: #0f0;
      }
      .battery.mid {
        color: #fa0;
      }
      .battery.low {
        color: #f44;
      }

      .joystick-area {
        position: relative;
        width: 280px;
        height: 280px;
      }

      .ring {
        position: absolute;
        inset: 0;
        border: 2px solid #333;
        border-radius: 50%;
      }

      .ring-label {
        position: absolute;
        top: -24px;
        width: 100%;
        text-align: center;
        font-size: 11px;
        color: #444;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .crosshair-x,
      .crosshair-y {
        position: absolute;
        background: #1a1a1a;
      }
      .crosshair-x {
        top: 50%;
        left: 10%;
        right: 10%;
        height: 1px;
      }
      .crosshair-y {
        left: 50%;
        top: 10%;
        bottom: 10%;
        width: 1px;
      }

      .dot {
        position: absolute;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 38%, #2af, #07f);
        box-shadow: 0 0 20px rgba(0, 170, 255, 0.4);
        transform: translate(-50%, -50%);
        top: 50%;
        left: 50%;
        cursor: grab;
        z-index: 5;
        transition: box-shadow 0.2s;
      }
      .dot.active {
        box-shadow: 0 0 32px rgba(0, 170, 255, 0.7);
        cursor: grabbing;
      }

      .telemetry {
        position: absolute;
        bottom: 28px;
        display: flex;
        gap: 40px;
        font-size: 13px;
      }

      .motor-info {
        text-align: center;
      }
      .motor-info .label {
        color: #555;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      .motor-info .value {
        font-size: 28px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        min-width: 60px;
        display: inline-block;
      }
      .motor-info .value.pos {
        color: #0f0;
      }
      .motor-info .value.neg {
        color: #f44;
      }
      .motor-info .value.zero {
        color: #444;
      }

      .motor-detail {
        font-size: 11px;
        color: #555;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="status" id="status">Connected</div>
    <div class="battery" id="battery">--% &middot; --.--V</div>

    <div class="joystick-area" id="joystick">
      <div class="ring">
        <span class="ring-label">100%</span>
      </div>
      <div class="crosshair-x"></div>
      <div class="crosshair-y"></div>
      <div class="dot" id="dot"></div>
    </div>

    <div class="telemetry">
      <div class="motor-info">
        <div class="label">Left</div>
        <div class="value zero" id="left-val">0</div>
        <div class="motor-detail">A &amp; C</div>
      </div>
      <div class="motor-info">
        <div class="label">Right</div>
        <div class="value zero" id="right-val">0</div>
        <div class="motor-detail">B &amp; D</div>
      </div>
    </div>

    <script>
      const dot = document.getElementById('dot');
      const joystick = document.getElementById('joystick');
      const statusEl = document.getElementById('status');
      const leftVal = document.getElementById('left-val');
      const rightVal = document.getElementById('right-val');

      const baseUrl = `http://${window.location.host}`;

      // Timing constants
      const SEND_INTERVAL_MS = 100; // Send commands at ~10 Hz while active
      const FETCH_TIMEOUT_MS = 400; // Abort fetch if no response in 400ms
      const STOP_RETRIES = 3; // Retry stop command this many times

      const radius = 140;
      let dragging = false;
      let currentLeft = 0;
      let currentRight = 0;
      let sendTimer = null;
      let inFlight = false;

      function getCenter() {
        const rect = joystick.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function updateDot(clientX, clientY) {
        const c = getCenter();
        let dx = clientX - c.x;
        let dy = clientY - c.y;

        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > radius) {
          dx = (dx / dist) * radius;
          dy = (dy / dist) * radius;
        }

        dot.style.left = `calc(50% + ${dx}px)`;
        dot.style.top = `calc(50% + ${dy}px)`;

        const nx = dx / radius;
        const ny = dy / radius;

        currentLeft = clamp(Math.round((ny + nx) * 100), -100, 100);
        currentRight = clamp(Math.round((ny - nx) * 100), -100, 100);

        updateDisplay(currentLeft, currentRight);
      }

      function resetDot() {
        dot.style.left = '50%';
        dot.style.top = '50%';
        currentLeft = 0;
        currentRight = 0;
        updateDisplay(0, 0);
      }

      function updateDisplay(left, right) {
        leftVal.textContent = left;
        rightVal.textContent = right;
        leftVal.className =
          'value ' + (left > 0 ? 'pos' : left < 0 ? 'neg' : 'zero');
        rightVal.className =
          'value ' + (right > 0 ? 'pos' : right < 0 ? 'neg' : 'zero');
      }

      // -- Fixed-rate send loop -----------------------------------------
      // While the joystick is active, fire a command every SEND_INTERVAL_MS.
      // If the previous request is still in-flight, skip that tick.
      // This feeds the ESP32 watchdog (500ms) and always sends the latest
      // joystick values rather than queuing stale ones.

      function startSending() {
        if (sendTimer) return;
        fireCommand(); // immediate first send
        sendTimer = setInterval(fireCommand, SEND_INTERVAL_MS);
      }

      function stopSending() {
        if (sendTimer) {
          clearInterval(sendTimer);
          sendTimer = null;
        }
        sendStopReliably();
      }

      function fireCommand() {
        if (inFlight) return; // previous request still pending — skip this tick
        inFlight = true;

        const abort = new AbortController();
        const timeout = setTimeout(() => abort.abort(), FETCH_TIMEOUT_MS);
        const l = currentLeft;
        const r = currentRight;

        fetch(`${baseUrl}/motors?a=${l}&b=${r}&c=${l}&d=${r}`, {
          signal: abort.signal,
        })
          .then(() => {
            clearTimeout(timeout);
            statusEl.textContent = `OK — L:${l} R:${r}`;
            statusEl.className = 'status ok';
          })
          .catch((e) => {
            clearTimeout(timeout);
            if (e.name !== 'AbortError') {
              statusEl.textContent = 'Send error';
              statusEl.className = 'status err';
            }
          })
          .finally(() => {
            inFlight = false;
          });
      }

      // Retry stop command multiple times for reliability.
      // Even if all retries fail, the ESP32 watchdog will stop motors
      // within 500ms.
      async function sendStopReliably() {
        for (let attempt = 0; attempt < STOP_RETRIES; attempt++) {
          try {
            const c = new AbortController();
            const t = setTimeout(() => c.abort(), 500);
            await fetch(`${baseUrl}/motors?a=0&b=0&c=0&d=0`, {
              signal: c.signal,
            });
            clearTimeout(t);
            statusEl.textContent = 'Stopped';
            statusEl.className = 'status ok';
            return;
          } catch (e) {
            if (attempt < STOP_RETRIES - 1) {
              await new Promise((r) => setTimeout(r, 50));
            }
          }
        }
        statusEl.textContent = 'Stop retries failed — watchdog will engage';
        statusEl.className = 'status err';
      }

      // -- Pointer events (mouse + touch unified) -----------------------

      function onStart(e) {
        e.preventDefault();
        dragging = true;
        dot.classList.add('active');
        const pt = e.touches ? e.touches[0] : e;
        updateDot(pt.clientX, pt.clientY);
        startSending();
      }

      function onMove(e) {
        if (!dragging) return;
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        updateDot(pt.clientX, pt.clientY);
      }

      function onEnd(e) {
        if (!dragging) return;
        dragging = false;
        dot.classList.remove('active');
        resetDot();
        stopSending();
      }

      joystick.addEventListener('mousedown', onStart);
      joystick.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onEnd);
      window.addEventListener('touchend', onEnd);
      window.addEventListener('touchcancel', onEnd);

      // -- Safety: stop motors if browser tab goes hidden ---------------
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && (dragging || sendTimer)) {
          dragging = false;
          dot.classList.remove('active');
          resetDot();
          stopSending();
        }
      });

      // -- Keyboard fallback — arrow keys -------------------------------
      const keys = {};

      window.addEventListener('keydown', (e) => {
        if (
          ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)
        ) {
          e.preventDefault();
          const wasIdle = !Object.values(keys).some(Boolean);
          keys[e.key] = true;
          updateFromKeys();
          if (wasIdle) startSending();
        }
      });

      window.addEventListener('keyup', (e) => {
        if (
          ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)
        ) {
          keys[e.key] = false;
          updateFromKeys();
          if (!Object.values(keys).some(Boolean)) {
            resetDot();
            stopSending();
          }
        }
      });

      function updateFromKeys() {
        let y = 0,
          x = 0;
        if (keys['ArrowUp']) y += 1;
        if (keys['ArrowDown']) y -= 1;
        if (keys['ArrowRight']) x += 1;
        if (keys['ArrowLeft']) x -= 1;

        currentLeft = clamp(Math.round((y + x) * 100), -100, 100);
        currentRight = clamp(Math.round((y - x) * 100), -100, 100);

        dot.style.left = `calc(50% + ${x * radius}px)`;
        dot.style.top = `calc(50% + ${-y * radius}px)`;

        updateDisplay(currentLeft, currentRight);
      }
      // -- Battery polling ----------------------------------------------
      const batteryEl = document.getElementById('battery');

      async function pollBattery() {
        try {
          const c = new AbortController();
          const t = setTimeout(() => c.abort(), 2000);
          const res = await fetch(`${baseUrl}/battery`, { signal: c.signal });
          clearTimeout(t);
          const data = await res.json();
          const pct = data.percentage;
          const v = data.voltage;
          batteryEl.textContent = `${pct}% \u00B7 ${v}V`;
          batteryEl.className =
            'battery ' + (pct > 50 ? 'high' : pct > 20 ? 'mid' : 'low');
        } catch (e) {
          // silent — battery display just stays stale
        }
      }

      pollBattery();
      setInterval(pollBattery, 5000);
    </script>
  </body>
</html>
